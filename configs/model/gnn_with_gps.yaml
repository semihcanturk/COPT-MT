defaults:
  - base

net:
  _target_: src.models.network.gnn_with_gps.HybridGNNWithGPSStack
  dim_in: 1
  dim_out: 1
  dim_inner: 64
  head_type: 'inductive_node'
  encoder:
    _target_: src.models.network.gnn.FeatureEncoder
    node_encoder:
      _target_: src.models.encoder.graph_stats_encoder.GraphStatsEncoder
      stat_list: ['degree', 'eccentricity', 'cluster_coefficient', 'triangle_count']
    node_encoder_bn: True
  conv:
    _target_: src.models.layer.gconconv.GCONLayer
    dim_in: ${model.net.dim_inner}
    dim_out: ${model.net.dim_inner}
    channel_list: [[0], [1], [2], [4], [0, 1], [1, 2], [2, 4]]
    combine_fn: 'att_bias'
    num_heads: 1
    activation_att1: 'elu'
    activation_att2: 'elu'
    activation: 'elu'
    depth_mlp: 1
    skip: True
    add_self_loops: True
    norm: 'gcn'
    filter_norm_dim: None
    bias: False
  layers_pre_mp: 1
  layers_mp: 16
  layers_post_mp: 1
  stage_type: 'stack'
  batch_norm: True
  l2_norm: False
  final_l2_norm: False
  gsn: False
  dropout: 0.3
  has_act: True
  act: 'gelu'
  last_act: 'sigmoid'
  graph_pooling: 'add'
  edge_decoding: 'concat'
  hybrid_stage: 'concat'
  # GPS stack configuration (trainable, between backbone and head)
  gt_stack_layers: 3
  gt_stack_local_model: null
  gt_stack_self_attn:
    _target_: torch.nn.MultiheadAttention
    embed_dim: ${model.net.dim_inner}
    num_heads: 4
    dropout: 0.0
    batch_first: True
  gt_stack_dropout: 0.1
  gt_stack_attn_dropout: 0.0
  gt_stack_batch_norm: True
  gt_stack_layer_norm: False