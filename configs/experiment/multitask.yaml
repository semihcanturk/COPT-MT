# @package _global_

defaults:
  - override /data: ba_small.yaml #add a file to mix datasets? (e.g rb_large + ba_large + ...)
  - override /model: gcon.yaml
  - override /task: multitask.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters


tags: ["multitask", "rb", "small", "gcon"]

seed: 12345

trainer:
  min_epochs: 25
  max_epochs: 100
  gradient_clip_val: 0.5

callbacks:
  model_checkpoint:
    monitor: "val/loss"
    mode: "min"
  early_stopping:
    monitor: "val/loss"
    mode: "min"

logger:
  wandb:
    tags: ${tags}

data:
  num_workers : 0

model:
  _target_: src.models.copt_module.MultiCOPTModule
  ### define custom weights for the losses ###
  weights:
    
  net:
    _target_: src.models.network.gnn.MultiHybridGNN
    dim_out:
      maxcut: 1
      maxclique: 1
      mds: 1
      mis: 1
      ### change for the number of colors/cliques desired ###
      color: 10
      cliquecover: 10
    # write here the list of tasks to train on 
    tasks : ['maxcut'] 
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    stage_type: 'stack'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    act:
      _target_: torch.nn.LeakyReLU
      negative_slope: 0.3
    # temporary fix for eccentricity (doesn't work with rb dataset)
    encoder:
      node_encoder:
        stat_list: ['degree', 'cluster_coefficient', 'triangle_count']
    

  