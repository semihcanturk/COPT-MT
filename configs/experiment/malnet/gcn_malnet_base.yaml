# @package _global_

# not meant to run by itself as MalNetTiny does not have any node/edge features.
# run `gcn_malnet` instead to run MalNetTiny without any PSE:
# python src/train.py experiment=malnet/gcn_malnet

defaults:
  - override /data: malnet.yaml
  - override /model: gcn.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "malnet", "graph_classification"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

model:
  task: "graph"
  num_classes: 5  # Binary classification for MUTAG dataset
  net:
    in_channels: 1  # Number of node features in MUTAG dataset
    out_channels: 5  # Should match num_classes

data:
  batch_size: 32

logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"