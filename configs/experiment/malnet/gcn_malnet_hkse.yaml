# @package _global_

# to execute this experiment run:
# python src/train.py experiment=malnet/gcn_malnet_hkse

defaults:
  - malnet/gcn_malnet_base.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "malnet", "graph_classification", "hkse"]

model:
  net:
    in_channels: 5  # Number of heat kernel SE features

data:
  transforms:
    hkse:
      _target_: src.transforms.heat_kernel.AddHeatKernelSE
      kernel_times: "range(2,7)"
      attr_name: null

logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"