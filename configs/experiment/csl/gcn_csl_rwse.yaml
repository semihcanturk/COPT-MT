# @package _global_

# to execute this experiment run:
# python src/train.py experiment=csl/gcn_csl_rwse

defaults:
  - csl/gcn_csl_base.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "csl", "graph_classification", "rwse"]

data:
  transforms:
    rwse:
      _target_: torch_geometric.transforms.AddRandomWalkPE
      walk_length: 5
      attr_name: null

model:
  net:
    dim_in: ${data.transforms.rwse.walk_length}  # Number of RWSE features

logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"