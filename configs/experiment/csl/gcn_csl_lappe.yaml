# @package _global_

# to execute this experiment run:
# python src/train.py experiment=csl/gcn_csl_lappe

defaults:
  - csl/gcn_csl_base.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "csl", "graph_classification", "lappe"]

data:
  transforms:
    laplacian_pe:
      _target_: torch_geometric.transforms.AddLaplacianEigenvectorPE
      k: 5  # Number of Laplacian eigenvectors to use
      is_undirected: True
      attr_name: null

model:
  net:
    dim_in: ${data.transforms.laplacian_pe.k}  # Number of LapPE features

logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"
