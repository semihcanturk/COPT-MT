# @package _global_

# to execute this experiment run:
# python src/train.py experiment=csl/gcn_csl_espe

defaults:
  - csl/gcn_csl_base.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "csl", "graph_classification", "espe"]

model:
  net:
    in_channels: 7  # Number of ElectrostaticPE features

data:
  transforms:
    electrostatic_pe:
      _target_: src.transforms.electrostatic.AddElectrostaticPE
      attr_name: null

logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"