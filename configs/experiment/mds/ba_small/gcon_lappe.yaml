# @package _global_

defaults:
  - override /data: ba_small.yaml
  - override /model: gcon.yaml
  - override /task: mds.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mds", "ba", "small", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

data:
  batch_size: 256
  transforms:
    _target_: torch_geometric.transforms.AddLaplacianEigenvectorPE
    k: 31
    is_undirected: True
    attr_name: null

logger:
  wandb:
    tags: ${tags}
    project: "COPT-MT [MDS]"

model:
  net:
    dim_in: 32
    dim_inner: 256
    encoder: null
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    stage_type: 'skipsum'
    batch_norm: True
    l2_norm: True
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    act: 'gelu'

callbacks:
  model_checkpoint:
    mode: 'min'
  early_stopping:
    mode: 'min'