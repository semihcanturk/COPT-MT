# @package _global_

# to execute this experiment run:
# python src/train.py experiment=csl/gcn_csl_lcp

defaults:
  - mutag/gcn_mutag.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "mutag", "graph_classification", "lcp"]

model:
  net:
    in_channels: 12  # Number of original (7) + LCP (5) features


data:
  transforms:
    lcp:
      _target_: src.transforms.lcp.AddLocalCurvatureProfile
      attr_name: null


logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"