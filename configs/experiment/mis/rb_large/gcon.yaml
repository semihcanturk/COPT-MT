# @package _global_

defaults:
  - override /data: rb_large.yaml
  - override /model: gcon.yaml
  - override /task: mis.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mis", "rb", "large", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

logger:
  wandb:
    tags: ${tags}

model:
  net:
    layers_pre_mp: 1
    layers_mp: 20
    layers_post_mp: 2
    stage_type: 'skipsum'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    final_act: True
    act: 'relu'
    encoder:
      node_encoder:
        stat_list: ['degree', 'cluster_coefficient', 'triangle_count']