# @package _global_

defaults:
  - override /data: rb_small.yaml
  - override /model: gcon.yaml
  - override /task: mis.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mis", "rb", "small", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

logger:
  wandb:
    tags: ${tags}
    project: "COPT-MT [MIS]"

model:
  _target_: src.models.copt_module.COPTTransferModule
  pretrain_path: '/home/mila/s/semih.canturk/COPT-MT/weights/mvc/GCON [1 post-MP] [1e-3]/checkpoints/epoch_224.ckpt'
  freeze: 'backbone'
  reset_head: True
  optimizer:
    _target_: torch.optim.AdamW
  net:
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    dim_inner: 32
    stage_type: 'stack'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    act:
      _target_: torch.nn.LeakyReLU
      negative_slope: 0.3
    encoder:
      _target_: src.models.network.gnn.FeatureEncoder
      node_encoder:
        _target_: src.models.encoder.graph_stats_encoder.GraphStatsEncoder
        stat_list: ['degree', 'cluster_coefficient', 'triangle_count']

callbacks:
  early_stopping:
    patience: 30
