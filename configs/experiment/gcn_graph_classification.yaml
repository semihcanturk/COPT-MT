# @package _global_

# to execute this experiment run:
# python src/train.py experiment=gcn_graph_classification

defaults:
  - override /data: tu_dataset.yaml
  - override /model: gcn.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "tu_dataset", "graph_classification"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

model:
  task: "graph"
  num_classes: 2  # Binary classification for MUTAG dataset
  net:
    in_channels: 7  # Number of node features in MUTAG dataset
    out_channels: 2  # Should match num_classes

data:
  dataset_name: "MUTAG"
  batch_size: 32

logger:
  wandb:
    tags: ${tags}
    group: "gcn_graph_classification"