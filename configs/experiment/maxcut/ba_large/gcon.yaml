# @package _global_

# not meant to run by itself as CSL does not have any node/edge features.
# run `gcn_csl` instead to run CSL without any PSE:
# python src/train.py experiment=csl/gcn_csl

defaults:
  - override /data: ba_large.yaml
  - override /model: gcon.yaml
  - override /task: maxcut.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["maxcut", "ba", "large", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

logger:
  wandb:
    tags: ${tags}

model:
  net:
    layers_pre_mp: 4
    layers_mp: 16
    layers_post_mp: 1
    stage_type: 'skipsum'
    batch_norm: True
    l2_norm: True
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    final_act: True
    act: 'relu'
