# @package _global_

defaults:
  - override /data: rb_small.yaml
  - override /model: gcon.yaml
  - override /callbacks: default.yaml
  - override /task: mvc.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mvc", "rb", "small", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 300
  gradient_clip_val: 0.5

data:
  batch_size: 256
  transforms:
    _target_: torch_geometric.transforms.AddLaplacianEigenvectorPE
    k: 31
    is_undirected: True
    attr_name: null

logger:
  wandb:
    tags: ${tags}
    project: "COPT-MT [MVC]"

model:
  optimizer:
    #_target_: torch.optim.Rprop
    _target_: torch.optim.AdamW
    _partial_: True
    lr: 0.0005
    #weight_decay: 0.0
  net:
    dim_in: 32
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    dim_inner: 64
    stage_type: 'stack'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    gsn: False
    dropout: 0.3
    has_act: True
    act: 'gelu'
    encoder: null

callbacks:
  model_checkpoint:
    mode: 'min'
  early_stopping:
    mode: 'min'
    patience: 200