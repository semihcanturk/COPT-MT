# @package _global_

defaults:
  - override /data: rb_small.yaml
  - override /model: gcon.yaml
  - override /callbacks: default.yaml
  - override /task: mvc.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mvc", "rb", "small", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 300
  gradient_clip_val: 0.5

logger:
  wandb:
    tags: ${tags}
    project: "COPT-MT [MVC]"

model:
  _target_: src.models.copt_module.COPTTransferModule
  pretrain_path: '/Users/semo/PycharmProjects/COPT-MT/logs/train/pretrained/mis/GCON [1e-2] [1-4-1] [64dim] [wd0.01]/checkpoints/epoch_001.ckpt'
  freeze: 'all'
  invert_head: True
  reset_head: False
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0005
  net:
    _target_: src.models.network.gnn.HybridGNN
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    dim_inner: 64
    stage_type: 'stack'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    act: 'gelu'
    encoder:
      _target_: src.models.network.gnn.FeatureEncoder
      node_encoder:
        _target_: src.models.encoder.graph_stats_encoder.GraphStatsEncoder
        stat_list: ['degree', 'cluster_coefficient', 'triangle_count']

callbacks:
  model_checkpoint:
    mode: 'min'
  early_stopping:
    mode: 'min'