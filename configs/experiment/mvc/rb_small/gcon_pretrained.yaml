# @package _global_

defaults:
  - override /data: rb_small.yaml
  - override /model: gcon.yaml
  - override /callbacks: default.yaml
  - override /task: mvc.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mvc", "rb", "small", "gcon"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 300
  gradient_clip_val: 0.5

logger:
  wandb:
    tags: ${tags}

model:
  _target_: src.models.copt_module.COPTTransferModule
  pretrain_path: '/home/mila/s/semih.canturk/COPT-MT/logs/train/runs/2026-01-01_09-38-08/checkpoints/last.ckpt'
  # pretrain_path: '/Users/semo/PycharmProjects/COPT-MT/logs/train/runs/2026-01-01_09-38-08/checkpoints/last.ckpt'
  freeze: 'backbone'
  reset_head: True
  optimizer:
    #_target_: torch.optim.Rprop
    _target_: torch.optim.AdamW
    _partial_: True
    # lr: 0.001
    #weight_decay: 0.0
  net:
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    stage_type: 'stack'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    dropout: 0.3
    has_act: True
    act:
      _target_: torch.nn.LeakyReLU
      negative_slope: 0.3
    encoder:
      _target_: src.models.network.gnn.FeatureEncoder
      node_encoder:
        _target_: src.models.encoder.graph_stats_encoder.GraphStatsEncoder
        stat_list: ['degree', 'cluster_coefficient', 'triangle_count']

callbacks:
  model_checkpoint:
    mode: 'min'
  early_stopping:
    mode: 'min'