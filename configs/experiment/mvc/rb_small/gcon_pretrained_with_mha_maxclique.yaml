# @package _global_

defaults:
  - override /data: rb_small.yaml
  - override /model: gnn_with_gps.yaml
  - override /callbacks: default.yaml
  - override /task: mvc.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mvc", "rb", "small", "gcon", "gps", "transfer"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 300
  gradient_clip_val: 0.5

logger:
  wandb:
    tags: ${tags}
    project: "COPT-MT [MVC]"

model:
  _target_: src.models.copt_module.COPTTransferModule
  pretrain_path: '/home/mila/s/semih.canturk/COPT-MT/weights/maxclique/GCON-12345/checkpoints/epoch_511.ckpt'
  freeze: 'backbone'  # Freezes encoder, pre_mp, mp; keeps gt_stack and post_mp trainable
  reset_head: True
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.005
  net:
    # Backbone configuration (will be loaded from pretrained and frozen)
    layers_pre_mp: 1
    layers_mp: 16
    layers_post_mp: 1
    dim_inner: 64
    stage_type: 'stack'
    batch_norm: True
    l2_norm: False
    final_l2_norm: False
    gsn: True
    dropout: 0.3
    has_act: True
    act: 'gelu'
    encoder:
      _target_: src.models.network.gnn.FeatureEncoder
      node_encoder:
        _target_: src.models.encoder.graph_stats_encoder.GraphStatsEncoder
        stat_list: ['degree', 'cluster_coefficient', 'triangle_count']
      node_encoder_bn: True
    # GPS stack configuration (trainable, randomly initialized)
    gt_stack_layers: 3
    gt_stack_local_model: null
    gt_stack_self_attn:
      _target_: torch.nn.MultiheadAttention
      embed_dim: ${model.net.dim_inner}
      num_heads: 4
      dropout: 0.0
      batch_first: True
    gt_stack_dropout: 0.1
    gt_stack_attn_dropout: 0.0
    gt_stack_batch_norm: True
    gt_stack_layer_norm: False

callbacks:
  model_checkpoint:
    mode: 'min'
  early_stopping:
    mode: 'min'
