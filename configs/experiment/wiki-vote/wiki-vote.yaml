# @package _global_

# to execute this experiment run:
# python src/train.py experiment=gcn_node_classification

defaults:
  - override /data: snap_dataset.yaml
  - override /model: gcn.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["graph", "gcn", "wiki-vote", "node_classification"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 100
  gradient_clip_val: 0.5

model:
  task: "node"
  num_classes: 42  # For CLUSTER dataset
  net:
    in_channels: 7  # Number of node features in CLUSTER dataset
    out_channels: 42  # Should match num_classes
    task: "node"

data:
  dataset_name: "wiki-vote"
  batch_size: 32

logger:
  wandb:
    tags: ${tags}
    group: "gcn_node_classification"